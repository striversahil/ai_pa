<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospect Manual Research Workbench</title>
    <meta name="description" content="A premium manual workbench to search, verify, and enrich B2B prospects.">
    <link rel="stylesheet" href="index.css">
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header" id="main-header">
            <div class="logo-area">
                <i class="fa-solid fa-compass-drafting logo-icon"></i>
                <h1>Prospect Research <span>Manual Workbench</span></h1>
            </div>
            <div class="stats-area">
                <div class="progress-info">
                    <span id="progress-text">0 / 0 Completed</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="app-main">
            <!-- LEFT PANEL: DIRECTORY -->
            <section class="directory-panel" aria-label="Prospects Directory">
                <div class="search-filter-box">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search company, city, state..." autocomplete="off">
                        <button id="clear-search-btn" class="clear-btn" style="display: none;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="tab-filters">
                        <button class="tab-btn active" id="tab-pending" data-tab="pending">
                            Pending <span class="badge" id="badge-pending">0</span>
                        </button>
                        <button class="tab-btn" id="tab-completed" data-tab="completed">
                            Completed <span class="badge" id="badge-completed">0</span>
                        </button>
                        <button class="tab-btn" id="tab-all" data-tab="all">
                            All <span class="badge" id="badge-all">0</span>
                        </button>
                    </div>
                </div>
                
                <div class="prospects-table-container">
                    <table class="prospects-table" id="prospects-table">
                        <thead>
                            <tr>
                                <th style="width: 60px; text-align: center;">Status</th>
                                <th>Company</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th style="width: 90px; text-align: center;">Priority</th>
                            </tr>
                        </thead>
                        <tbody id="prospects-table-body">
                            <tr>
                                <td colspan="5">
                                    <div class="loading-state">
                                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                                        <p>Loading prospects...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- RIGHT PANEL: WORKBENCHES WORKBENCH -->
            <section class="workbenches-panel" id="workbenches-panel" style="display: flex; flex-direction: column; gap: 0.75rem; flex: 0 0 70%; height: 100%;">
                <div class="workbenches-grid" id="workbenches-grid" style="flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 0.75rem;">
                    <!-- Dynamically populated 4 slots will be loaded here by index.js -->
                </div>
                <div class="consolidated-actions" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 0.75rem 1.25rem; display: flex; justify-content: flex-end; backdrop-filter: var(--backdrop-blur); -webkit-backdrop-filter: var(--backdrop-blur); box-shadow: var(--shadow-soft);">
                    <button type="button" class="action-btn primary large" id="btn-submit-all" style="width: 100%; display: flex; justify-content: center; font-size: 0.95rem; font-weight: 700; padding: 0.75rem 2rem; border-radius: 8px;" disabled>
                        <i class="fa-solid fa-floppy-disk"></i> Submit & Verify Filled Slots (0 / 4)
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast" role="alert">
        <i class="fa-solid fa-circle-check toast-icon" id="toast-icon"></i>
        <span id="toast-message">Action completed!</span>
    </div>

    <script src="index.js"></script>
</body>
</html>
